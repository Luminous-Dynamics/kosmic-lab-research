repos:
  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending
        args: [--fix=lf]

  # Python code formatting
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3.11
        args: [--line-length=100]

  # Import sorting
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks: []

  # Linting
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks: []

  # Ruff for linting (replaces flake8 + isort)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.4
    hooks:
      - id: ruff
        args: [--line-length=100, --select=E,F,I, --ignore=E501]
        exclude: ^docs/|
      - id: ruff-format
        exclude: ^docs/|

  # Security checks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        args: [--skip=B101]  # Allow assert in tests

  # Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.1
    hooks:
      - id: mypy
        additional_dependencies:
          - types-PyYAML
          - types-jsonschema
        args: [--strict, --ignore-missing-imports]
        exclude: ^tests/

  # Documentation
  - repo: https://github.com/pycqa/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        args: [--convention=numpy]
        exclude: ^tests/

  # Kosmic Lab specific hooks
  - repo: local
    hooks:
      # Ensure config registry is canonical JSON
      - id: validate-config-registry
        name: Validate config registry canonical JSON
        entry: python scripts/validate_registry.py --path configs/config_registry.json
        language: system
        pass_filenames: false
        files: ^configs/config_registry\.json$

      # Validate K-passport JSON schema
      - id: validate-k-passports
        name: Validate K-passport schema
        entry: python -c "from jsonschema import Draft7Validator; import json; schema = json.load(open('schemas/k_passport.json')); Draft7Validator.check_schema(schema)"
        language: system
        pass_filenames: false
        files: ^schemas/k_passport\.json$

      # Validate K-codex JSON schema
      - id: validate-k-codex
        name: Validate K-codex schema
        entry: python -c "from jsonschema import Draft7Validator; import json; schema = json.load(open('schemas/k_codex.json')); Draft7Validator.check_schema(schema)"
        language: system
        pass_filenames: false
        files: ^schemas/k_codex\.json$

      # Check for hardcoded magic numbers in universe params
      - id: check-magic-numbers
        name: Check for undocumented magic numbers
        entry: scripts/check_magic_numbers.py
        language: python
        files: ^(core|fre|historical_k)/.*\.py$
        exclude: ^tests/

      # Ensure all experiments log K-passports
      - id: check-passport-logging
        name: Verify K-passport logging
        entry: python -c "import sys; assert 'KPassportWriter' in open(sys.argv[1]).read(), f'{sys.argv[1]} missing K-passport logging'"
        language: system
        files: ^fre/.*\.py$
        exclude: ^(tests|__init__)
