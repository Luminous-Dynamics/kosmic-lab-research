name: Nix Flake Check

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-24.05

      - name: Nix flake check
        run: nix flake check --print-build-logs

