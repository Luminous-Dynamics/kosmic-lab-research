name: TE-Bench

on:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.2
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Run TE micro-benchmark
        run: poetry run python scripts/bench_te.py
