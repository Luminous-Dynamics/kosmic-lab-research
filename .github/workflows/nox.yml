name: Nox Sessions

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  nox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.2

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run nox tests
        run: poetry run nox -s tests

      - name: Run nox lint
        run: poetry run nox -s lint

      - name: Run nox format check
        run: poetry run nox -s format_check

      - name: Run nox API tests
        run: poetry run nox -s api_tests
